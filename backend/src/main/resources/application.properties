spring.application.name=poolbet

# Porta injetada por plataformas de deploy (fallback 8080 em dev).
server.port=${PORT:8080}

# --- MySQL (desenvolvimento) ---
# Credenciais vem do ambiente (nunca commitar segredos — repo publico).
# Defina MYSQL_USER e MYSQL_PASSWORD; defaults servem para um MySQL local padrao.
# Em producao, sobrescreva via SPRING_DATASOURCE_URL / _USERNAME / _PASSWORD.
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/poolbet?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate ---
# Schema e gerido pelo Flyway; Hibernate apenas valida que as entidades batem com as tabelas.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# --- Flyway ---
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
