spring.application.name=poolbet

# --- H2 em memoria (testes) ---
# Torna a suite auto-contida: `mvn test` nao precisa de MySQL nem Docker.
spring.datasource.url=jdbc:h2:mem:poolbet;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# --- JPA / Hibernate ---
# Nos testes o schema e gerado pelo Hibernate a partir das entidades.
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false

# Flyway roda apenas contra o MySQL de dev/prod (a migration usa sintaxe MySQL).
spring.flyway.enabled=false
